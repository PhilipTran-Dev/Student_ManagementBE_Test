server:
  port: 8080

spring:
  application:
    name: gateway-service

  cloud:
    gateway:
      globalcors:
        cors-configurations:
          '[/**]':
            allowedOrigins:
              - "http://localhost:5173"
              - "http://localhost:3000"
              - "http://192.168.66.133:5173"
              - "http://192.168.66.133"
            allowedMethods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
              - OPTIONS
            allowedHeaders: "*"
            allowCredentials: true

      routes:
        - id: class-service
          uri: lb://class-service
          predicates:
            - Path=/api/v1/classes/**, /api/v1/courses/**, /api/v1/semesters/**, /api/v1/admin/courses/**, /api/v1/admin/semesters/**

        - id: user-service
          uri: lb://user-service
          predicates:
            - Path=/api/v1/auth/**, /api/v1/admin/**, /api/v1/teacher/**, /api/v1/student/**

        - id: assignment-service
          uri: lb://assignment-service
          predicates:
            - Path=/api/v1/assignments/**

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}