server:
  port: 8083

spring:
  application:
    name: assignment-service

  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

  datasource:
    url: jdbc:postgresql://${DB_HOST:localhost}:${DB_PORT:5432}/${DB_NAME:assignment_service}
    username: ${DB_USER:postgres}
    password: ${DB_PASSWORD:123}
    driver-class-name: org.postgresql.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true
        dialect: org.hibernate.dialect.PostgreSQLDialect

app:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000,http://192.168.66.133:5173}
  jwt:
    secret: ${APP_JWT_SECRET:3c963655447b567565b90214e9f7f0bc62e1e07b7134017326dfbf0800b6ed5b}
  services:
    user-service:
      url: ${USER_SERVICE_URL:http://user-service}
    class-service:
      url: ${CLASS_SERVICE_URL:http://class-service}
  minio:
    endpoint: ${MINIO_ENDPOINT:http://localhost:9000}
    access-key: ${MINIO_ACCESS_KEY:admin}
    secret-key: ${MINIO_SECRET_KEY:supersecretpassword}
    bucket: ${MINIO_BUCKET:assignment-materials}

eureka:
  instance:
    prefer-ip-address: true
  client:
    service-url:
      defaultZone: ${EUREKA_URL:http://localhost:8761/eureka/}