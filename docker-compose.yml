version: '3.8'

services:
  postgres-db:
    image: postgres:16-alpine
    container_name: postgres-classroom
    restart: always
    ports:
      - "5432:5432"
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: "123"
      POSTGRES_DB: user_service
    volumes:
      - postgres_classroom_data:/var/lib/postgresql/data
    networks:
      - classroom-network

  user-service:
    image: phucngo249/user-service:latest
    build:
      context: .
      dockerfile: user-service/Dockerfile
    container_name: user-service-app
    restart: always
    ports:
      - "8081:8081"
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=user_service
      - DB_USER=postgres
      - DB_PASSWORD=123
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://192.168.66.133:5173
    depends_on:
      - postgres-db
    networks:
      - classroom-network

  class-service:
    image: phucngo249/class-service:latest
    build:
      context: .
      dockerfile: class-service/Dockerfile
    container_name: class-service-app
    restart: always
    ports:
      - "8082:8082"
    environment:
      - DB_HOST=postgres-db
      - DB_PORT=5432
      - DB_NAME=class_service
      - DB_USER=postgres
      - DB_PASSWORD=123
      - USER_SERVICE_HOST=user-service
      - CORS_ALLOWED_ORIGINS=http://localhost:5173,http://192.168.66.133:5173
    depends_on:
      - postgres-db
      - user-service
    networks:
      - classroom-network

  frontend:
    image: phucngo249/classroom-frontend:latest
    container_name: classroom-frontend-app
    restart: always
    ports:
      - "5173:80"
    networks:
      - classroom-network
    depends_on:
      - user-service

volumes:
  postgres_classroom_data:

networks:
  classroom-network:
    driver: bridge