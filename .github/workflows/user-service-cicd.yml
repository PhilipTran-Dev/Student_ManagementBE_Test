name: Backend CI/CD (Parallel Build, Push and Deploy All Services)

on:
  push:
    branches:
      - main
      - master

jobs:
  build-discovery:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Discovery Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./discovery_service/Dockerfile
          push: true
          tags: phucngo249/discovery-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-user:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./user-service/Dockerfile
          push: true
          tags: phucngo249/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-class:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Class Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./class_service/Dockerfile
          push: true
          tags: phucngo249/class-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-assignment:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Assignment Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./assignment_service/Dockerfile
          push: true
          tags: phucngo249/assignment-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  build-gateway:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}
      - name: Build and push Gateway Service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: ./gateway_service/Dockerfile
          push: true
          tags: phucngo249/gateway-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: [build-discovery, build-user, build-class, build-assignment, build-gateway]
    runs-on: self-hosted
    steps:
      - name: Checkout repository files to Runner workspace
        uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          # Pull toàn bộ image mới cấu hình trong file compose
          docker compose pull
          # Ép recreate lại toàn bộ các service để đồng bộ mã nguồn mới
          docker compose up -d --force-recreate