name: Backend CI/CD (Build, Push and Deploy All Services)

on:
  push:
    branches:
      - main
      - master

jobs:
  build-and-push:
    runs-on: ubuntu-latest
    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to Docker Hub
        uses: docker/login-action@v3
        with:
          username: ${{ secrets.DOCKER_USERNAME }}
          password: ${{ secrets.DOCKER_PASSWORD }}

      - name: Build and push User Service
        uses: docker/build-push-action@v5
        with:
          context: ./user-service
          file: ./user-service/Dockerfile
          push: true
          tags: phucngo249/user-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build and push Class Service
        uses: docker/build-push-action@v5
        with:
          context: ./class_service
          file: ./class_service/Dockerfile
          push: true
          tags: phucngo249/class-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy:
    needs: build-and-push
    runs-on: self-hosted

    steps:
      - name: Checkout repository files to Runner workspace
        uses: actions/checkout@v4

      - name: Deploy via Docker Compose
        run: |
          # Kéo toàn bộ các bản Image mới nhất của cả User và Class về máy ảo
          docker compose pull
          
          # Khởi động lại toàn cụm để áp dụng cấu hình đồng bộ cùng lúc
          docker compose up -d