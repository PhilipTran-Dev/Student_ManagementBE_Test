server:
  port: 8082

spring:
  application:
    name: class-service

  datasource:
    url: jdbc:mysql://${DB_HOST:localhost}:3306/${DB_NAME:class_service}?useSSL=false&serverTimezone=UTC&allowPublicKeyRetrieval=true&createDatabaseIfNotExist=true
    username: ${DB_USER:root}
    password: ${DB_PASSWORD:0917635632Mysql}
    driver-class-name: com.mysql.cj.jdbc.Driver

  jpa:
    hibernate:
      ddl-auto: update
    show-sql: true
    properties:
      hibernate:
        format_sql: true

app:
  allowed-origins: ${CORS_ALLOWED_ORIGINS:http://localhost:5173,http://localhost:3000}

  services:
    user-service-url: http://${USER_SERVICE_HOST:localhost}:8081