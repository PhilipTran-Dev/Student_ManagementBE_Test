name: User Service CI/CD Pipeline

on:
  push:
    branches:
      - main
      - develop
    paths:
      - 'user-service/**'

jobs:
  build-and-deploy:
    runs-on: self-hosted

    steps:
      - name: Checkout Source Code
        uses: actions/checkout@v4

      - name: Set up JDK 17
        uses: actions/setup-java@v4
        with:
          java-version: '17'
          distribution: 'temurin'

      - name: Run Unit Tests with Maven
        run: |
          cd user-service
          chmod +x mvnw
          ./mvnw test

      - name: Rebuild and Deploy Docker Container
        run: |
          docker compose up -d --no-deps --build user-service